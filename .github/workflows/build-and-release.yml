# Build firmware for all controller types and publish as GitHub Release when a new tag is pushed or on manual run.

name: Build and Release

on:
  push:
    tags:
      - '*'   # e.g. v1.0.0, release-1.2.3
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0). Used as release name and tag when run manually.'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache pip and PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Set version for firmware build
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ github.event.inputs.tag }}"
          else
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "/* Overwritten by CI - do not edit */" > src/Version.h
          echo "#ifndef VERSION_H" >> src/Version.h
          echo "#define VERSION_H" >> src/Version.h
          echo "#define APP_VERSION \"${RELEASE_TAG}\"" >> src/Version.h
          echo "#endif" >> src/Version.h

      - name: Build Hobbywing
        run: pio run -e lolin_c3_mini_hobbywing

      - name: Build T-Motor
        run: pio run -e lolin_c3_mini_tmotor

      - name: Build XAG
        run: pio run -e lolin_c3_mini_xag

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp .pio/build/lolin_c3_mini_hobbywing/firmware.bin release/firmware-hobbywing.bin
          cp .pio/build/lolin_c3_mini_tmotor/firmware.bin release/firmware-tmotor.bin
          cp .pio/build/lolin_c3_mini_xag/firmware.bin release/firmware-xag.bin

      - name: Set release body
        id: release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="HEAD"
          else
            REF="${GITHUB_REF#refs/tags/}"
          fi

          PREVIOUS_TAG=$(git tag -l --sort=-v:refname | awk -v t="$TAG" '{ if ($0 == t) found=1; else if (found) { print; exit } }')
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD 2>/dev/null | head -1)
          fi

          CHANGELOG=""
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log "$PREVIOUS_TAG..$REF" --pretty=format:"- %s (%h)" 2>/dev/null || true)
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG=$(git log -20 --pretty=format:"- %s (%h)" 2>/dev/null || true)
          fi

          {
            echo "body<<RELEASE_BODY"
            echo "**Commit:** \`${GITHUB_SHA}\`"
            echo "**Ref:** ${GITHUB_REF_NAME}"
            echo ""
            if [ -n "$CHANGELOG" ]; then
              echo "### Changes since previous release"
              echo ""
              echo "$CHANGELOG"
              echo ""
            fi
            echo "### Firmware images"
            echo "- \`firmware-hobbywing.bin\` — Hobbywing (DroneCAN)"
            echo "- \`firmware-tmotor.bin\` — T-Motor (UAVCAN)"
            echo "- \`firmware-xag.bin\` — XAG (PWM/analog)"
            echo "RELEASE_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          body: ${{ steps.release.outputs.body }}
          files: |
            release/firmware-hobbywing.bin
            release/firmware-tmotor.bin
            release/firmware-xag.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
