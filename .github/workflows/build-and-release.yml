# Build firmware for all controller types and publish as GitHub Release when a new tag is pushed or on manual run.

name: Build and Release

on:
  push:
    tags:
      - '*'   # e.g. v1.0.0, release-1.2.3
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0). Used as release name and tag when run manually.'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache pip and PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Set version for firmware build
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ github.event.inputs.tag }}"
          else
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "/* Overwritten by CI - do not edit */" > controller/src/Version.h
          echo "#ifndef VERSION_H" >> controller/src/Version.h
          echo "#define VERSION_H" >> controller/src/Version.h
          echo "#define APP_VERSION \"${RELEASE_TAG}\"" >> controller/src/Version.h
          echo "#endif" >> controller/src/Version.h

      - name: Build Hobbywing
        working-directory: controller
        run: pio run -e lolin_c3_mini_hobbywing

      - name: Build T-Motor
        working-directory: controller
        run: pio run -e lolin_c3_mini_tmotor

      - name: Build XAG
        working-directory: controller
        run: pio run -e lolin_c3_mini_xag

      - name: Build Remote Throttle
        working-directory: throttle
        run: pio run -e remote_throttle

      - name: Prepare release artifacts
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p release
          cp controller/.pio/build/lolin_c3_mini_hobbywing/firmware.bin "release/firmware-hobbywing-${TAG}.bin"
          cp controller/.pio/build/lolin_c3_mini_tmotor/firmware.bin "release/firmware-tmotor-${TAG}.bin"
          cp controller/.pio/build/lolin_c3_mini_xag/firmware.bin "release/firmware-xag-${TAG}.bin"
          cp throttle/.pio/build/remote_throttle/firmware.bin "release/firmware-remote-throttle-${TAG}.bin"

      - name: Set release body
        id: release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="HEAD"
          else
            REF="${GITHUB_REF#refs/tags/}"
          fi

          # Find the previous release by walking git history from the tagged
          # commit's parent. Robust against out-of-order/misnamed tags — a
          # version or name sort can pick a tag pointing at an old commit and
          # bloat the changelog with unrelated history.
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${REF}^" 2>/dev/null || true)
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD 2>/dev/null | head -1)
          fi

          CHANGELOG=""
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log "$PREVIOUS_TAG..$REF" --pretty=format:"- %s (%h)" 2>/dev/null || true)
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG=$(git log -20 --pretty=format:"- %s (%h)" 2>/dev/null || true)
          fi

          {
            echo "body<<RELEASE_BODY"
            echo "**Commit:** \`${GITHUB_SHA}\`"
            echo "**Ref:** ${GITHUB_REF_NAME}"
            echo ""
            if [ -n "$CHANGELOG" ]; then
              echo "### Changes since previous release"
              echo ""
              echo "$CHANGELOG"
              echo ""
            fi
            echo "### Firmware images"
            echo "- \`firmware-hobbywing-${TAG}.bin\` — Hobbywing controller (DroneCAN)"
            echo "- \`firmware-tmotor-${TAG}.bin\` — T-Motor controller (UAVCAN)"
            echo "- \`firmware-xag-${TAG}.bin\` — XAG controller (PWM/analog)"
            echo "- \`firmware-remote-throttle-${TAG}.bin\` — Wireless remote throttle (ESP-NOW)"
            echo "RELEASE_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          body: ${{ steps.release.outputs.body }}
          files: |
            release/firmware-hobbywing-${{ steps.version.outputs.tag }}.bin
            release/firmware-tmotor-${{ steps.version.outputs.tag }}.bin
            release/firmware-xag-${{ steps.version.outputs.tag }}.bin
            release/firmware-remote-throttle-${{ steps.version.outputs.tag }}.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
