<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Power Alert UI Test</title>
  <style>
    :root {
      --bg: #eef2f6;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0b74de;
      --card: #ffffff;
      --border: #e5e7eb;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }
    .page { max-width: 700px; margin: 0 auto; padding: 16px; }

    /* status bar */
    .telemetry-status-bar {
      display: flex; align-items: center; gap: 8px;
      background: var(--primary); color: white;
      padding: 8px 12px; border-radius: var(--radius); margin-bottom: 10px;
    }
    .tsb-label { font-weight: 600; font-size: 13px; }
    .tsb-mid { flex: 1; text-align: center; }
    .status { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
    .status.live { background: #dcfce7; color: #166534; }
    .status.nodata { background: #fee2e2; color: #991b1b; }

    /* alert panel */
    .power-alert-panel {
      display: none;
      background: var(--card);
      border-radius: var(--radius);
      padding: 10px 12px;
      flex-shrink: 0;
      box-shadow: var(--shadow);
      font-size: 13px;
      line-height: 1.4;
      border-left: 4px solid #dc2626;
      margin-bottom: 10px;
    }
    .power-alert-panel.open { display: flex; align-items: flex-start; gap: 10px; }
    .power-alert-title { font-weight: 600; color: #991b1b; font-size: 13px; }
    .power-alert-causes { color: #991b1b; font-size: 12px; margin-top: 2px; }
    .power-alert-close {
      margin-left: auto; background: transparent; border: 0;
      color: #991b1b; cursor: pointer; padding: 0 2px; font-size: 18px; line-height: 1; flex-shrink: 0;
    }

    /* grid */
    .telemetry-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
    .card {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 12px;
      box-shadow: var(--shadow);
    }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .value { font-size: 24px; font-weight: 500; }
    .sub2 { display: flex; gap: 6px; margin-top: 6px; align-items: baseline; font-size: 12px; }
    .sub2-label { color: var(--muted); }
    .sub2-value { font-weight: 500; }
    .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* highlights */
    .card.power-limit-active { background: #fef2f2; border-color: #dc2626; }
    .card.power-limit-active .label { color: #991b1b; }
    .card.power-limit-active .value { color: #991b1b; }
    .power-limit-badge {
      background: #fee2e2; color: #991b1b;
      font-weight: 600; padding: 1px 6px; border-radius: 4px;
    }

    /* controls */
    .controls {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 14px; margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .controls h3 { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
    .controls label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
    .controls input[type=checkbox] { margin-right: 6px; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    button.btn {
      background: var(--primary); color: white;
      border: 0; border-radius: 6px; padding: 6px 14px;
      font-size: 12px; cursor: pointer;
    }
    button.btn.secondary {
      background: white; color: var(--text); border: 1px solid var(--border);
    }
    button.btn:hover { opacity: 0.88; }
    #log {
      margin-top: 12px; background: #f8fafc;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px; font-size: 11px; color: var(--muted);
      max-height: 90px; overflow-y: auto; font-family: monospace;
    }
  </style>
</head>
<body>
<div class="page">

  <div class="controls">
    <h3>Controles de teste</h3>
    <label><input type="checkbox" id="cbArmed"> Armado</label>
    <label><input type="checkbox" id="cbBattery"> Causa: Tensão baixa</label>
    <label><input type="checkbox" id="cbMotor"> Causa: Temperatura do motor alta</label>
    <label><input type="checkbox" id="cbEsc"> Causa: Temperatura do ESC alta</label>
    <div class="btn-row">
      <button class="btn" onclick="fireAlert()">Disparar alerta agora</button>
      <button class="btn secondary" onclick="clearAll()">Limpar tudo</button>
    </div>
    <div id="log">Pronto. Selecione causas e clique em "Disparar alerta".</div>
  </div>

  <div class="telemetry-status-bar">
    <span class="tsb-label">Telemetria</span>
    <div class="tsb-mid">
      <span class="status live" id="statusBadge">AO VIVO</span>
    </div>
  </div>

  <div class="power-alert-panel" id="powerAlertPanel">
    <div style="flex:1;">
      <div class="power-alert-title">&#x26A0; Potência reduzida</div>
      <div class="power-alert-causes" id="powerAlertCauses"></div>
    </div>
    <button class="power-alert-close" id="powerAlertClose" aria-label="Fechar">&#x2715;</button>
  </div>

  <div class="telemetry-grid">
    <div class="card" id="cardBattery">
      <div class="label">Tensão</div>
      <div class="value">48.2 V</div>
    </div>
    <div class="card">
      <div class="label">Bateria</div>
      <div class="value">72 %</div>
    </div>
    <div class="card" id="cardPower">
      <div class="label">Energia</div>
      <div class="value">3.1 kW</div>
      <div class="sub2">
        <span class="sub2-label">Limite</span>
        <span class="sub2-value" id="powerPercent">100 %</span>
      </div>
    </div>
    <div class="card">
      <div class="label">Acelerador</div>
      <div class="value">88 %</div>
    </div>
    <div class="card" id="cardMotorTemp">
      <div class="label">Motor</div>
      <div class="value">58.4 °C</div>
      <div class="sub">12,400 rpm</div>
    </div>
    <div class="card" id="cardEscTemp">
      <div class="label">ESC</div>
      <div class="value">104 °C</div>
      <div class="sub">18.2 A</div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

const PA_CAUSE_LABELS = {
  battery:   'Tensão da bateria baixa',
  motorTemp: 'Temperatura do motor alta',
  escTemp:   'Temperatura do ESC alta',
};
const PA_CAUSE_CARDS = {
  battery:   'cardBattery',
  motorTemp: 'cardMotorTemp',
  escTemp:   'cardEscTemp',
};

let paLastSeq = -1;
let paDismissedSeq = -1;

function log(msg) {
  const el = $('log');
  el.textContent = msg + '\n' + el.textContent;
}

function renderPowerAlert(pa) {
  const panel = $('powerAlertPanel');
  const causesEl = $('powerAlertCauses');
  const powerCard = $('cardPower');
  const causes = (pa && pa.causes) ? pa.causes : [];
  const seq = (pa && pa.seq != null) ? pa.seq : paLastSeq;

  // Persistent card highlights
  Object.keys(PA_CAUSE_CARDS).forEach(key => {
    const card = $(PA_CAUSE_CARDS[key]);
    if (!card) return;
    if (causes.includes(key)) card.classList.add('power-limit-active');
    else card.classList.remove('power-limit-active');
  });

  if (causes.length > 0) {
    powerCard.classList.add('power-limit-active');
    const pct = $('powerPercent');
    if (pct) pct.className = 'sub2-value power-limit-badge';
  } else {
    powerCard.classList.remove('power-limit-active');
    const pct = $('powerPercent');
    if (pct) pct.className = 'sub2-value';
  }

  // Dismissible panel
  if (causes.length === 0) {
    panel.classList.remove('open');
    paDismissedSeq = -1;
    paLastSeq = -1;
    return;
  }

  if (seq !== paLastSeq && seq !== paDismissedSeq) {
    paLastSeq = seq;
    causesEl.textContent = causes.map(c => PA_CAUSE_LABELS[c] || c).join(' · ');
    panel.classList.add('open');
  }
}

let currentSeq = 0;

function getActiveCauses() {
  const causes = [];
  if ($('cbBattery').checked) causes.push('battery');
  if ($('cbMotor').checked)   causes.push('motorTemp');
  if ($('cbEsc').checked)     causes.push('escTemp');
  return causes;
}

function fireAlert() {
  const causes = getActiveCauses();
  if (causes.length === 0) { log('Nenhuma causa selecionada'); return; }
  currentSeq++;
  log(`Disparando alerta seq=${currentSeq} causes=${causes.join(', ')}`);
  renderPowerAlert({ seq: currentSeq, causes });
}

function clearAll() {
  log('Limpando alerta');
  $('cbArmed').checked = false;
  $('cbBattery').checked = false;
  $('cbMotor').checked = false;
  $('cbEsc').checked = false;
  currentSeq = 0;
  renderPowerAlert({ seq: currentSeq, causes: [] });
}

$('powerAlertClose').addEventListener('click', () => {
  paDismissedSeq = paLastSeq;
  $('powerAlertPanel').classList.remove('open');
  log(`Alerta dispensado (dismissedSeq=${paDismissedSeq}). Próximo disparo reabrirá.`);
});
</script>
</body>
</html>
