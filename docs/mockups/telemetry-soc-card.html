<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mockup – Card Bateria</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 24px; }
  h1 { font-size: 18px; margin-bottom: 6px; color: #fff; }
  .desc { font-size: 13px; color: #aaa; margin-bottom: 28px; line-height: 1.4; }

  :root {
    --bg: #eef2f6; --text: #1f2937; --muted: #6b7280;
    --primary: #0b74de; --card: #ffffff; --border: #e5e7eb; --radius: 8px;
  }

  .row { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; align-items: flex-start; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .col-label {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; padding: 4px 14px;
    border-radius: 4px; text-align: center;
  }

  /* card standalone */
  .card-wrap { background: var(--bg); border-radius: 12px; padding: 12px; width: 200px; }
  .dp {
    background: var(--card); border-radius: var(--radius);
    padding: 12px 13px 11px; box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    display: flex; flex-direction: column;
  }
  .lbl {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--muted); font-weight: 600; line-height: 1;
  }
  .val {
    font-size: 36px; font-weight: bold; margin-top: 6px; line-height: 1.0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sub {
    font-size: 17px; color: var(--muted); margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-weight: 500;
  }
  .sub2 { margin-top: 5px; }
  .sub2-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; line-height: 1.1; }
  .sub2-value { font-size: 17px; color: var(--muted); font-weight: 600; line-height: 1.15; margin-top: 1px; }

  .note { font-size: 11px; color: #aaa; line-height: 1.5; text-align: center; max-width: 200px; }
  .note .g { color: #4ade80; }
  .note .b { color: #f87171; }
</style>
</head>
<body>

<h1>Card Bateria — antes e depois</h1>
<p class="desc">O SoC por Coulomb Count vira o valor principal. A porcentagem por tensão vai para o subtexto.</p>

<div class="row">

  <div class="col">
    <div class="col-label" style="background:#2a2a2a;color:#9ca3af">Antes</div>
    <div class="card-wrap">
      <div class="dp">
        <div class="lbl">SoC Bateria</div>
        <div class="val">17 %</div>
        <div class="sub2">
          <div class="sub2-label">Coulomb</div>
          <div class="sub2-value">17 %</div>
        </div>
      </div>
    </div>
    <div class="note"><span class="b">Tensão como valor principal</span><br>CC no subtexto</div>
  </div>

  <div class="col">
    <div class="col-label" style="background:#1a3a2a;color:#4ade80">Depois</div>
    <div class="card-wrap">
      <div class="dp">
        <div class="lbl">Bateria</div>
        <div class="val">82 %</div>
        <div class="sub2">
          <div class="sub2-label">Tensão</div>
          <div class="sub2-value">83 %</div>
        </div>
      </div>
    </div>
    <div class="note"><span class="g">CC como valor principal</span><br>Porcentagem por tensão no subtexto</div>
  </div>

</div>

</body>
</html>
